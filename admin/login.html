<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Giriş | Firma Store</title>
    <link rel="stylesheet" href="../css/global.css">
  </head>
  <body class="admin-body" data-admin-page="login">
    <main class="auth-shell">
      <section class="auth-panel">
        <form class="form-card" id="loginForm">
          <div>
            <span class="badge">Admin Panel</span>
            <h1>Giriş yap</h1>
            <p class="muted">Varsayılan giriş: admin / 123456</p>
          </div>
          <div class="field">
            <label for="username">Kullanıcı adı</label>
            <input id="username" name="username" autocomplete="username" required>
          </div>
          <div class="field">
            <label for="password">Şifre</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
          </div>
          <p class="muted" id="loginError" role="alert"></p>
          <button class="btn btn-primary" type="submit">Giriş yap</button>
          <a class="btn btn-outline" href="../index.html">Siteye dön</a>
        </form>
      </section>
    </main>

    <script src="../js/data.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../admin-js/auth.js"></script>
  </body>
</html>
