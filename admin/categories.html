<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kategoriler | Firma Store</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../components/admin-sidebar/admin-sidebar.css">
  </head>
  <body class="admin-body" data-admin-page="categories">
    <div class="admin-shell">
      <div data-component="admin-sidebar"></div>
      <main class="admin-main">
        <header class="admin-header">
          <div>
            <span class="badge">Katalog</span>
            <h1>Kategoriler</h1>
          </div>
        </header>
        <section class="grid grid-2">
          <form class="form-card" id="categoryForm">
            <div class="field">
              <label for="categoryName">Kategori adı</label>
              <input id="categoryName" name="name" required>
            </div>
            <div class="field">
              <label for="categoryDescription">Açıklama</label>
              <textarea id="categoryDescription" name="description"></textarea>
            </div>
            <label class="field-inline">
              <input name="active" type="checkbox">
              <span>Aktif</span>
            </label>
            <div class="cluster">
              <button class="btn btn-primary" id="categorySubmit" type="submit">Kategori ekle</button>
              <button class="btn btn-outline" id="categoryCancel" type="button">Temizle</button>
            </div>
          </form>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Kategori</th>
                  <th>Açıklama</th>
                  <th>Ürün</th>
                  <th>Durum</th>
                  <th>İşlem</th>
                </tr>
              </thead>
              <tbody id="categoriesTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../admin-js/auth.js"></script>
    <script src="../components/admin-sidebar/admin-sidebar.js"></script>
    <script src="../admin-js/image-upload.js"></script>
    <script src="../admin-js/product-manager.js"></script>
    <script src="../admin-js/category-manager.js"></script>
    <script src="../admin-js/order-manager.js"></script>
    <script src="../admin-js/admin-app.js"></script>
  </body>
</html>
