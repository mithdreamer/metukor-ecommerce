<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ürün Yönetimi | Firma Store</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../components/admin-sidebar/admin-sidebar.css">
  </head>
  <body class="admin-body" data-admin-page="products">
    <div class="admin-shell">
      <div data-component="admin-sidebar"></div>
      <main class="admin-main">
        <header class="admin-header">
          <div>
            <span class="badge" id="productsCount">0 ürün</span>
            <h1>Ürünler</h1>
          </div>
          <a class="btn btn-primary" href="new-product.html">Yeni ürün ekle</a>
        </header>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Görsel</th>
                <th>Ürün</th>
                <th>Kategori</th>
                <th>Fiyat</th>
                <th>Stok</th>
                <th>Durum</th>
                <th>İşlem</th>
              </tr>
            </thead>
            <tbody id="productsTableBody"></tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../admin-js/auth.js"></script>
    <script src="../components/admin-sidebar/admin-sidebar.js"></script>
    <script src="../admin-js/image-upload.js"></script>
    <script src="../admin-js/product-manager.js"></script>
    <script src="../admin-js/category-manager.js"></script>
    <script src="../admin-js/order-manager.js"></script>
    <script src="../admin-js/admin-app.js"></script>
  </body>
</html>
