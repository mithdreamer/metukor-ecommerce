<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ürünler | Firma Store</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../components/navbar/navbar.css">
    <link rel="stylesheet" href="../components/footer/footer.css">
    <link rel="stylesheet" href="../components/product-card/product-card.css">
  </head>
  <body data-page="products">
    <div data-component="navbar"></div>
    <main class="container">
      <header class="page-header">
        <span class="badge" id="resultCount">0 ürün</span>
        <h1>Ürünler</h1>
        <p>Arama, kategori ve sıralama ile vitrindeki ürünleri hızlıca bulun.</p>
      </header>

      <section class="filter-bar" aria-label="Ürün filtreleri">
        <div class="field">
          <label for="productSearch">Arama</label>
          <input id="productSearch" type="search" placeholder="Ürün adı, açıklama veya SKU">
        </div>
        <div class="field">
          <label for="categoryFilter">Kategori</label>
          <select id="categoryFilter"></select>
        </div>
        <div class="field">
          <label for="sortFilter">Sıralama</label>
          <select id="sortFilter">
            <option value="newest">En yeni</option>
            <option value="price-asc">Fiyat artan</option>
            <option value="price-desc">Fiyat azalan</option>
            <option value="name">Ada göre</option>
          </select>
        </div>
      </section>

      <section class="product-grid page-block" id="productGrid"></section>
    </main>
    <div data-component="footer"></div>

    <script src="../js/data.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../components/product-card/product-card.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/categories.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/orders.js"></script>
    <script src="../components/navbar/navbar.js"></script>
    <script src="../components/footer/footer.js"></script>
    <script src="../js/app.js"></script>
  </body>
</html>
